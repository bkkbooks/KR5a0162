front:
  text: 易象圖説序雲五易之象與天地凖故於天地之理無所不該是以隂陽錯綜竒偶離合無不有以相通焉周官三易經卦皆八其别皆六十有四以八為經以六十四為緯書卦之次序先天之圖位瞭然矣則伏羲作易時巳有其圖傳之三代故夫子極儀象卦因而重之之説與京君明魏伯陽納甲卦氣之法皆圓圖之序則先天圖其來巳久特後之説易者下復追究作易原本故其圖雖在而學者不傳至邵子而後得耳先儒謂邵子傳之李穆李穆自希夷意其必不妄也或又謂啓蒙先天圖出目蔡氏而朱子因之不知朱漢上巳有此圖則其出於邵氏為無疑雖聖人復起不易其言矣然易道廣大無窮學者能隨其所見亦皆有得惟其出於自然而無所穿鑿則雖古人之所未發亦足以成一家之言也清江張君仲純資敏而學篤於諸經無下通而尤邃於易嘗以其玩索之力著為易象圖説一編其極儀象卦圖以竒上偶下各生隂陽剛柔內外交變而卦畫之原四時之義性命之説圖書之數蓍䇿變占靡不周備六十四卦圓圖以乾兊離震坤艮坎巽循環旋布而天地之動靜一歲周天之氣節一月太隂之行度皆可見方圖以乾兊離震巽坎艮坤縱自上而下橫自左而右而參同契邵子太易吟十二月之卦氣二十八舍之象皆可推變通圖由乾坤反覆相推陽以次而左升隂以次而右降而六隂六陽辟卦之序粲然可考致用圖以後天八宫各變七卦而四正四隅反對之象秩然有紀皆巧妙整齊不煩智力無毫髮可以增損無纎隙有所疑議所謂出於自然而無所穿鑿者當續邵子朱子之圖而自為一家亦可以見易象無所不通惟學者能隨所見而實有得焉然後可以傳世而不惑也仲純學力髙明與豫知最久圖説既成首辱見示豫特愛其象類渾成而條理精密故僭書于首簡而歸之至正丁酉秋七月昭武紫雲山人黃鎮成謹序易曰河出圖洛出書聖人則之圖書者天地隂陽之象也易者聖人以寫天地隂陽之神也故一動一靜形而為一一竒偶生生動靜互變四象上下左右相交而易卦畫矣
