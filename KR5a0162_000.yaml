body:
  text: 以畫天以畫地以畫水以畫火以畫澤以畫山風因於澤雷因於山卦以表象象以命名名以顯義義以正辭辭逹而易書作矣將以順性命之理究禮樂之原成變化而行鬼神者要皆不出乎圖耆之象與數而已圖之天者也圖之地者也圖之中者四象古五字行也陽數一三參天也三謂之參隂數二四兩地也三謂之兩參天數九陽之用也兩地數六隂之用也書之𢖍三卦之醴也書之井九卦之位也書之縱𢖍十卦之合也乾九坤六合十坎七離八合十震七巽八合十艮七兊八合十河圖洛書相為經緯十者圖書之樞紐也以重十則左右前後者河圖四正之體也以交十則四正四隅者洛書九宫之文也順而左還者天之圓渾儀歷象之所由制逆而右布者地之方封建井牧之所由啓也以圓函方以方局圓則範圍天地之化而過曲成萬物而不遺矣唯人者天地之德隂陽之交鬼神之會行之秀氣也身半以上同乎天身半以下同乎地頭圓足方腹隂背陽離目外明坎耳內聰口鼻有肖乎山澤聲氣有象乎雷風故天下之理得而成位乎其中是知易即我心我心即易故推而圖之章之為六位而三極備敘之為六節而四時行合之為六體而身形具經之為六脈而神氣完表之為六經而治教立協之為六律而音聲均官之為六典而政令修統之為六師而邦國平是故因位以明道因節以敘德因體以原性因脈以凝命因經以考禮因律以正樂因典以平政因師以愼刑而大易八卦之體用備矣巳上八圖今付外篇八卦相錯相摩相蕩因而重之變而通之推而行之而六十四卦圓方變用之圖出矣圓者以效天方者以法地變者以從道用者以和義然後蓍䇿以綜其數變占以明其筮分挂揲歸交重支變悉皆為圖以顯其象為説以敷其趣雖其言不本於先儒傳注之旨或者庶幾乎聖人作易之大意改而正之諗而訂之是蓋深有望於同志時至正二十有四年青龍甲辰三月上巳日清江後學張理書于三山之艮所
