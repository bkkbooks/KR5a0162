front:
  text: 易象圖說内篇卷上
  hash: sha256:565e9c7ac0668c2fa9992311502a9defae908dd2cd04fdaf0e2c16b027e0b1b2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0162_HFL_001-001a, image: hfl/0071/0071-140.png}
body:
  text: 清江後學張理仲純述希夷陳先生龍圖亭曰且夫龍馬始負圖岀於羲皇之代在太古之先也今存已合之位尚疑之況更陳其未合之數邪然則何以知之答曰於夫子三陳九卦之義探其㫖所以知之也況夫天之垂象的如貫珠少有差則不成次序矣故自一至於盈萬皆累然如係之於縷也且若龍圖便合則聖人不得見其象所以天意先未合而形其象聖人觀象而明其用是龍圖者天散而示之伏羲合而用之仲尼黙而形之始龍圖之未合也惟五十五數上二十五天數也中貫三五九外包之十五盡天三天五天九并十五之位後形一六無位又顯二十四之爲用也茲所謂天垂象矣下三十地數也亦分五位皆明五之用也十分而爲六形地之象焉六分而成四象地六不配在上則一不配形二十四在下則六不用亦形二十四後旣合也天一居上爲道之宗地六居下爲器之本三斡地二地四爲之用本注參一三天數合九乾元用九也兩二四地數合六坤元用六也三若在陽則避孤隂在隂則避寡陽本注成八卦者三位也上則一三五爲三位二四無中正不能成卦爲孤隂下則六八十爲三位七九無中正不能成卦爲寡陽三皆不處若避之也大矣哉龍圖之變歧分萬途今略述其梗㮣焉仲尼黙示三陳九卦履德之基序卦次十明用十示人以辨上下也謙德之柄次十五明用十五示人以裒多益寡復德之本次二十四卦示氣變之始恒德之固下經次二卦小形化之始損德之修益德之裕此二卦示人以盛衰之端困德之辨井德之地此二卦示人以遷通之義巽德之制巽以行權權者聖人之大用也因事制宜隨時變易之義備矣本圖書右龍圖天地未合之數上位天數也天數中於五分爲五位五五二十有五積一三五七九亦得二十五焉五位縱横見三縱橫見五三位縱橫見九縱横見十五序言中貫三五九外包之十五者此也下位地數也地數中於六亦分爲五位五六凡三十積二四六八十亦得三十焉序言十分而爲六形地之象者此也圖書右龍圖天地己合之位上位象也合一三五爲參天偶二四爲兩地積之凡十五五行之生數也即前象上五位上王去四得一下五去三得二右五去二得三左五去一得四惟中不動序言天一居上爲道之宗者此也按律歷志云合二始以定剛柔一者陽之始二者隂之始今則此圖其上天者一之象也其下地者之象也其中天者四象五行也左上一太陽爲火之象右上一少隂爲金之象左下一少陽爲木之象右下一太隂爲水之象土者冲氣居中以運四方暢始施生亦隂亦陽右旁三三才之象卦之所以畫三左旁四四時之象蓍之所以揲四是故上象一二三四者蓍數卦爻之體也下位形也九八七六金木火水之盛數中見地十土之成數也即前象下五位以中央六分開置一在上六而成七置二在左六而成八置三在右六而成九惟下六不配而自爲六序言六分而成四象地六不配者此也按七者蓍之圓七七而四十有九八者卦之方八八而六十有四九者陽之用陽爻百九十二六者隂之用隂爻亦百九十二十者大衍之數以五乗十以十乗五而亦皆得五十焉是故下形六七八九者著數卦爻之用也上體而下用上象而下形象動形靜體立用行而造化不可勝旣矣按一二三四天之象象變於上六七八九地之形形成於下上下相重而爲五行則左古前後生成之位是也上下相交而爲八卦則四正四隅九宫之位是也今以前後圖參攷當如太乙遁甲隂陽二局圖一二三四猶遁甲天盤在上隨時運轉六七八九猶遁甲地盤在下布定不易法明天動地靜之義而前此諸儒未有能發其㫖是故一在南起法天象動而右轉初交一居東南二居西北三居西南四居東北四陽班布居上右四隂班布居下左分隂分陽而天地設位再交一居東北二居西南三居東南四居西北則牝牡相衘而六子卦生合是二變而成先天八卦自然之象也然後重爲生成之位則一六二七三八四九險陽各相配合即邵子朱子所述之圖也三交一居西北二居東南三居東北四居西南則剛柔相錯而爲坎離震兊四交一居西南二居東北三居西北四居東南則右陽左隂而乾坤成列合是二變而成復大八卦裁成之位也垂轉則一復于南矣大傳所謂參伍以變錯綜其數劉歆云河圖洛書相爲經緯八卦九章相爲表裏此其義也鶴田蔣師文曰謂河圖成數在下象地而不動生數象天運行而成卦以先天八卦爲自然之象後天八卦爲射成之位觀其初交而兩儀立再交而六子生三交震兊相望而坎離互宅四交乾坤成列而艮巽居隅聖人升離於南降坎於北而四方之位正置乾於西北退坤於西南而長女代母之義彰則先天見自然之象後天見財成之位者至明著矣雖其說不本先儒然象數旣陳而義理昭著不害自爲一家之言也子朱子嘗曰無事時好看河圖洛書數且得自家流轉得動今觀仲純此說而尤信右龍圖天地生成之數此即前圖一二三四天之象也動而右旋六七八九地之形也靜而正位是故一轉居北而與六合二轉居南而與七合三轉居東而與八合四轉居西而與九合五十居中而爲天地運行之樞紐大傳言錯綜其數者蓋指此而言錯者交而互之一左一右三四往來是也綜者綜而挈之一低一昻一二上下是也分作二層看之則天動地靜上下之義昭然矣右洛書天地交午之數楊子雲曰一與六共宗二與七爲朋三與八爲友四與九同道與相守正指此圖而言朱子謂析六七八九之合以爲乾坤坎離而居四正之位依一二三四之次以爲艮兊震巽而補四隅之空者與此數合稽之生成之象察其分合進退交重動靜灼然信其爲交午之象而所謂大衍之數五十其用四十有九蓍䇿分卦揲歸四象七八九六皆倣於此矣右洛書縱横十五之象洪範初一曰五行次二曰敬用五事次三曰農用八政次四曰恊用五紀次五曰建用皇極次六曰又用三德次七曰明用稽疑次八曰念用庶徴次九曰嚮用五福威用六極漢儒以此六十五字爲洛書本文而希夷所傳則以此爲龍圖三變以生成圖爲洛書本文蓋疑傅冩之誤而啓圖九書十之辨仐以二象兩易其名則龍圖龜書不煩擬議而自明矣易大傳曰河岀圖洛出書聖人則之孔安國云河圖者伏羲氏王天下龍馬岀河遂則其文以畫八卦洛書者禹治水時神龜負文而列于背有數至九禹遂因而第之以成九類劉歆云伏羲氏繼天而王受河圖而畫之八卦是也禹治洪水賜洛書法而陳之九疇是也河圖洛書相爲經緯八卦九章相爲表裏關子明云河圖之文七前六後八左九右洛書之文九前一後三左七右四前左二前右八後左六後右邵子曰圓者星也曆紀之數其肇於此乎曆法合二始以定剛柔二中以定律暦二終以紀閏餘是所謂暦紀也方者土也畫州井地之法其倣於此乎州有九井九百畝是所謂畫州井地也蓋圓者河圖之數方者洛書之文故羲文因之而造易禹箕叙之而作範也天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天数二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也此一節蓋以發明圖書之數凡竒爲陽陽者天之數凡偶爲隂隂者地之數天數一三五七九積之爲二十五地數二四六八十積之爲三十合是二者爲五十有五而爻地變化隂陽屈伸舉不出乎此數是數也兩之爲二儀參之爲三才伍之爲五行分之爲八卦究之爲九宫此其大要也朱子曰天地之間一氣而已分而爲二則爲隂陽而五行造化萬物終始無不管於是焉内經曰隂陽者數之可十推之可百數之可千推之可萬萬之大不可勝數範之以易則不過不遺而無不通矣叅伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此此一節又以發明圖書之變參謂參於兩間如記云離坐離立母往參焉之叅攷之圖變如一二三四參居六七八九之間者是也伍謂伍於五位如什伍部伍之伍攷之圖變如一二三四伍於六七八九之土者是也錯者交而互之一左一右之譚攷之圖變則三四左右互居是也綜者綜而挈之一低一昂之謂攷之圖變則一二上下低昻是也旣參以變又伍以變錯而互之綜而交之而天地之文成天下之象定然則河圖洛書其肇天下之至變者與昔者聖人之作易也幽賛於神明而生蓍參天兩地而倚數觀變於隂陽而立卦發揮於剛柔而生爻和順於道德而理於義窮理盡性以至於命此章乃聖人作易之大㫖而蓍數卦爻之本原也幽賛於神明言聖人齋戒洗心退藏於宻而神明隂相默佑四十九蓍用以分掛揲歸而生隂陽剛柔之䇿天數地數參兩相倚以明九八七六之象故觀變於天之隂陽而卦象立發揮於地之剛柔而爻義生和順於道德而條理各適其宜窮天地隂陽剛柔之理盡已之性以盡人物之性則可以賛天地之化育而與造化之流行者無間此則聖人至誠之極功也昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章聖人作易將以順性命之理大抵爲斯人而作也故觀於隂陽而立天之道天之道寒暑晝夜而已矣察於剛柔而立地之道地之道流峙生植而已矣本於仁義而立人之道人之道孝悌忠信而巳矣蓋人禀隂陽之氣以有生賦剛柔之質以有形具仁義之理以成性氣形質具性成而三才之道備矣故以八卦言則初爲地中爲人上爲天而有竒偶之異兼三才而兩之以重卦言則初二爲地三四爲人五上爲天分而言之初三五爲位之陽二四上爲位之隂陽爲剛隂爲柔隂陽剛柔迭用於一卦六爻之間相錯而成文章也易之爲書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也道有變動故曰爻爻有等故曰物物相襍故曰文文不當故吉凶生焉道者天地人之道天之一隂一陽交而成乂地之一柔一剛交而成十乂十重而成爻變動之謂也爻也者效此者也爻也者效天下之動者也等差等也等字從竹軍籌也從十從一數之終始也以不持而算之指事義也舊說等從等於義無取今正之爻之動靜有初二三四五上之等七八九六之差故曰物物時物也七九爲竒而凡物之陽者質之剛者皆爲乾之物六八爲偶而凡物之隂者質之柔者爲坤之物分而言之九陽而六隂七剛而八柔隂陽象也剛柔形也故九六變而七八不變爻用九六主變而言也又曰蓍數七卦數八剛柔之體所以立乾爻用九坤爻用六隂陽之用所以行隂陽合德剛柔有體相錯襍而成文文文章也文字從乂隂陽相交之象文而當則吉居得其正動而適中則合乎物宜而吉生矣吉字從隂變陽者也從口陽變隂者也一字諧聲居變動中變而克正故爲吉㑹意書曰德惟一動罔不吉傳曰天下之動貞天一者也金華王魯齋以吉字爲老陽岀土之象文不當則凶居失其中動而匪正則入于坎陷而凶生矣凶字從乂變動者也動而陷于口中則失其中正而凶之川陷坑也會意金華王魯齋以凶字爲老隂入地之象故曰吉凶悔吝生乎動易象圖說内篇卷上
