body:
  text: 清江後學張理仲純述原卦畫一右太極生兩儀之象易本無乾坤止有此一一太極判而氣之輕清者上浮為天氣之重濁者下凝為地聖人仰觀俯察受河圖則而畫卦則天以畫則地以畫名曰竒為陽名曰偶為隂此上竒下偶者天地之定位中者天地氣交四象八卦萬物化生之本樂記所謂一動一靜者天地之間也周子曰太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根分隂分陽兩儀立焉卦畫二右兩儀生四象之象易本無八卦止有此乾坤朱子曰陽儀生竒為太陽生偶為少隂隂儀生竒為少陽生偶為太隂舊圖四象平布生生不息今圖陽儀下生一竒一偶為隂陽隂儀上生一竒一偶為剛柔四象圜轉循環不窮剛交於隂隂交於剛陽交於柔柔交於陽上下左右相交而萬物生焉周子曰陽變隂合而生水火木金土五氣順布四時行焉傳曰立天之道曰隂與陽立地之道曰柔與剛此之謂也右兩儀生四象隂儀上生一竒為少陽少陽者隂中之陽東方陽氣生物於時為春春蠢也物蠢生乃能運動故中規在天為風在地為木上為歲星在德為元元者善之長也在體為筋在藏為肝通於目在志為怒其聲呼其色蒼其味酸其音角其畜雞其榖麥其觀三木之生數陽儀下生一竒為太陽太陽者陽中之陽南方陽氣養物於時為夏夏假也物假大乃宣平故中𢖍在天為熱在地為火上為熒惑星在德為亨亨者嘉之㑹也在體為脉在藏為心通於舌在志為喜其聲笑其也赤其味苦其音徵其畜羊其榖黍其數七火之成數陽儀下生一偶為少隂少隂者陽中之隂西方隂氣斂物於時為秋秋馥也物揫斂乃能成熟故中矩在天為燥在地為金上為太白星在德為利利者義之和也在體為皮毛在藏為肺通於鼻在志為憂其聲哭其色白其味辛其音商其畜馬其榖稻其數四金之生數隂儀上生一偶為太隂太隂者隂中之隂北方隂氣藏物於時為冬冬終也物終藏乃可稱故中權在天為寒在地為水上為辰星在德為貞貞者事之幹也在體為骨在藏為腎通於耳在志為恐其聲呻其色黑其味鹹其音羽其畜彘其榖豆其數六水之成數中央者隂陽之中四方之內經緯交通乃能端直故中繩於時為四季在天為濕在地為土上為鎮星在德為誠周子曰元亨誠之通利貞誠之復在體為肉在藏為脾通於口在志為思其聲歌其色黃其味甘其音宫其畜牛其榖稷其數五土之生數卦畫三右四象生八卦之象易本無六十四卦止有此八卦古者伏羲氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦以通神明之德以類萬物之情與地之間一本有天字右言聖人作卦之由易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業右言聖人畫卦之㫖右四象陽下交於柔柔上交於陽而成乾坤天地定位艮兊山澤通氣剛上交於隂隂下交於剛而成震巽雷風相薄坎離水火不相射天秉陽垂日星離為日兊為星在天者仰而反觀故乾兊離震天之四象自上而下生地秉隂竅山川艮為山坎為川在地者俯而順察故坤艮坎巽地之四象自下而上生八卦相錯上者交左下者交右則乾南坤北離東坎西而先天八卦圓圖之象著矣震艮互觀反震為艮反艮為震則乾坤艮巽居隅坎離震兊居中而後天八卦方圖之象著矣由是動靜相資先後互體圓方變用而天地造化之義不可勝既矣邵子曰乾坤為大父母見四象圖復姤為小父母見八卦圖夫易根於乾坤而生於姤復蓋剛交柔而為復柔交剛而為姤自茲而無窮矣又曰八卦之象不易者四乾坤坎離反易者二震反為艮兊反為巽以六變而成八也右本前四象生八卦圖陽儀上者交於左隂儀下者交於右而成此圖康節先生云坤北乾南離東坎西震東北兊東南巽西南艮西北者指此而言其中者太極也者二儀也前象竒偶定上下之位由天地四象八卦總之而㑹于中所謂斂之不盈一握萬殊而一本也此圖隂陽列左右之門由動靜四時八方推之而達于外所謂放之則彌六合一本而萬殊也湯誥曰惟皇上帝降衷于下民若有恆性劉子曰民受天地之中以生孔子曰天地之性人為貴子思子曰天命之謂性中也性也天之所以與我者稽之生成圖則見天地四象八卦萬物皆備於我程子所謂天然自有之中孟子所謂萬物皆備於我曽子所談忠夫子所謂一其理不外乎是矣先天圖由一而一由二而四由四而八推而至于百千萬億之無窮先儒所謂心為太極具衆理而應萬事孟子所謂强恕而行曽子所謂恕夫子所謂貫其道亦不外乎是矣學者於此虛心以玩之反身而體之實見是理實得是道默而成之則道德性命之藴禮樂刑政之原舉不越乎此矣右本前四象生八卦圖中四卦反觀之則為震兊坎離旁四卦正觀之則為乾坤艮巽故此象坎離震兊居四方之正乾坤艮巽居四隅之偏稽之河圖一六居北為水而坎當之坎者水也二七居南為火而離當之離者火也三八居東為木而震當之震為雷動於春也四九居西為金而兊當之兊為澤於秋也乾為寒為氷位於西北附兊而為金巽為揚為風位於東南附震而為木五十居中為土而坤地艮山分𨽻之坤隂也故稽類而退居西南艮陽也亦稽類而奠居東北此後天八卦方位之所由定也是故協之天時驗之地利稽之人事而四氣運行之序可知矣說卦曰艮者萬物之所成終所成始也物不可以無主故帝出乎震震東方也日之所出也主器者莫若長子長子用事而長女配之故次之以巽有宗子世婦之象家齊而後國治由家以及國故次之以離離也者明也聖人南面而聽天下大明中天之象也日中則是故次之以坤坤者順也致役乎坤休工之義也故次之以兊兊西方也日之所入也嚮晦入宴息故曰說言乎兊又次之以乾乾陽也西北隂方也隂陽相薄故曰戰乎乾次之以坎坎者水也正北方之卦夜半之時幽隂之象故曰勞乎坎勞然後有成故曰成言乎艮而次之以艮終焉卦畫六右本前四象生八卦圖而左右四卦易位乾離坎坤居中頭目心腹之象震艮巽兊居左右手足股肱之象希夷先生以為形類合蓋人者天地之合氣也惟皇降衷若有恆性故凡言道學者皆原於此雜卦云乾剛坤柔離上坎下兊見巽伏震起艮止稽此而言參同契云乾坤者易之門戶衆卦之父母坎離匡郭運轂正軸牝牡四卦以為橐籥亦為有得於此今故表而傳焉卦畫七右六十四卦循環之圖說卦曰天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也右明先天六十四卦圓圖之象天地定位乾南坤北天尊乎上地畀乎下山澤通氣山鎮西北澤注東南雷風相薄雷出東北風盛西南水火不相射離降而東大明日生於東坎升而西小明月生於西此以內象言主乎靜而鎮位者也八卦相錯錯者交而互之一左一右之謂乾互巽而巽互乾坎互兊而兊互坎離互艮而艮互離坤互震而震互坤乾兊離震陽儀之卦本在左方令互居右方隂儀之上坤艮坎巽隂儀之卦本在右方今互居左方陽儀之上由是剛柔相摩八卦相蕩而變化無窮焉申說詳見下文此以外象言主乎動而趣時者也圜轉推蕩而成六十四卦環周於八方亦如二十八宿分布於十二辰是故右行而數之則乾兊離震坤艮坎巽八卦由內若外如環之無端也數往者順往謂巳往過後之卦順者順其八卦之叙如自今日而追數前日自冬至而數回立冬秋分則自坤而艮而坎而巽乾皆順其叙而數之也知來者逆來謂方來在前之卦逆者逆其八卦之叙如自今日而逆計來日自冬至而數向立春春分則自坤而震而離而兊乾皆逆其叙而知之也然凡易之數皆由逆而推生爻自下而上數卦自右而左故曰易逆數也按此圖以先天圖一仰一覆下體八卦靜而守位上體八卦動而右轉由是剛柔相摩八卦相蕩一貞而八悔八八六十四卦左右相交震宫八卦震交於坤起於復次震次噬嗑次隨無妄益屯至頥而得貞悔反對之象震下艮上二象反對離宫八卦離交於艮起於賁坎明夷次豐次離革同人家人至既濟而得隂陽交中之卦離下坎上三陽三隂畫夜平分兊宫八卦兊交於坎起於節次損次臨次歸妹睽兊履至中孚而得貞悔反對之象兊下巽上二象反對乾宫八卦乾交於巽起於小畜次需次大畜次泰大壯大有夬至乾而得六陽純體之卦極焉此圖之左方也巽宮八卦巽交於乾起於姤次巽次井次蠱升恆鼎至大過而得貞悔反對之象巽下兊上二象反對坎宫八卦坎交於兊起於困次訟次渙次坎蒙師解至未濟而得剛柔中分之卦坎下離上三剛三柔書夜平均艮宮八卦艮交於離起於旅次咸次遁次漸蹇艮謙至小過而得貞悔反對之象艮下震上二象反對坤宫八卦坤交於震起於豫次晉次萃次否觀比剝至坤而得六隂純體之卦周焉此圖之右方也環而觀之則乾坤泰否坎離既未隨蠱漸歸妹頥大過中孚小過凡一十六卦交易反對三位相間纍纍若貫珠若網在綱有條而不紊察其自然之妙非人力之所能為也是故以一歲之節論之震始交坤一陽生冬至之卦變坤為復是以乾起於復之初九而盡於午中巽始消乾一隂生夏至之卦變乾為姤是以坤起於姤之初六盡於子中乾坤定上下之位冬至變坤隂多多寒晝極短而夜極長夏至變乾陽多多熱畫極長而夜極短冬夏二至隂陽合也乾坤交中而為坎離坎離交而為既未既未交南北兩間之中春分變既濟而為節是以坎起於莭之九二而盡於酉中秋分變未濟而為旅是以離起於旅之六二而盡於卯中三陽三隂溫凉適宜畫夜平等春秋二分隂陽離也立春變頥而為賁頥卦二陽外而四隂內立夏變中孚而為小畜中孚四陽外而二隂內此春夏陽在外而隂在內聖人春夏養陽之時立秋變大過而為困大過二隂外而四陽內立冬觀小過而為豫小過四隂外而二陽內此秋冬陽在內而隂在外聖人秋冬養隂之時是則一歲周天之莭備于圖而邵子所謂春夏秋各書夜長短由乎此者也又以一月之度推之則重坤之時乃晦朔之間以次而生明小過之震反對二震三日昏時出庚之西也大過之兊反對二兊八曰上弦在丁之南也至十五則乾體就望而盛滿出於東方甲地以漸而生𩲸中乎之巽反對二巽十八日平明見辛之西也頥卦之艮反對二艮二十三日下弦直丙之兩也此一月太隂之行度備于圖而邵子所談晦朔弦望行度盈縮由乎此者也至若艮東北之卦萬物之所成終所成始故冬至之卦盡於艮山雷頥卦而立春之節起於艮山火賁卧自然之數也故曰易與天地准邵子曰圖雖無文吾終日言而未嘗離乎是蓋天地萬物之理盡在其中矣朱子曰先天圖今以一歲之運言之若大而古今十二萬九千六百年亦只是這圈子小而一日十二時亦只是這圈子都從復上推起去傳曰天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣是故剛柔相摩八卦相蕩鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女右上繫首章蓋發明先天六十四卦圓圖之義天尊地卑乾坤定矣天清而居上地濁而居下上尊而下卑乾坤之位以之而定也卑髙以陳貴賤位矣陽尊而隂卑君尊而臣卑各陳其位貴賤之等以之而分也動靜有常剛柔斷矣外動而內靜陽動而隂靜各守其常剛柔之義以之而判也上者親乎天下者親乎地乾兊離震之卦類聚於東南坤艮坎巽之卦類聚於西北而八卦之物亦皆隨卦而羣分如馬牛羊豕各自為羣方以類聚物以羣分也合沙鄭氏曰動物屬陽植物屬隂動者不能植偏於陽也植者不能動偏於隂也隂陽之物以是而羣分唯人為能動而直植而動所以得隂陽之全固能靈於物也乾為陽之陽為飛走之羣艮坎震為陽之隂為蟲魚之羣坤為隂之隂為上石之羣巽離兊為隂之陽為草木之羣隂陽剛柔善惡聚分而吉凶生矣吉凶者失得之象也雨暘燠寒風五者來備各以其時吉之象也一極備一極無凶之象也事物之有得失而休咎徵吉凶生亦猶是也在天成象日月星辰也在地成形水火木金也象見於天形成於地而變化之跡著矣剛柔相摩一七三九為剛二六四八為柔摩研摩也知摩之研轉相摩而成八卦也八卦相蕩蕩搖動也以水滌器蕩轉而搖動之謂乾坤坎離震艮巽兊相蕩而成六十四卦也鼓之以雷霆震艮之象也潤之以風雨巽兊之象也日月運行坎離之象也一寒一暑日行南去極遠而寒日行北去極近而暑此變化之成象者也乾道成男坤道成女此變化之成形者也按圖而觀思過半矣卦畫八右六十四卦因重之圖說卦曰雷以動之風以散之雨以潤之日以烜之艮以止之兊以說之乾以君之坤以藏之右明先天六十四卦方圖之象邵子曰圖皆從中起今按雷以動之風以散之正居此圖中央及四維之中雨以潤之曰以烜之則坎次巽離次震艮以止之兊以說之則艮次坎兊次離乾以君之坤以藏之則乾次兊坤次艮皆由乎中而達乎外是故左右上下縱橫相因六十四卦方位所由定矣東南陽方而乾居之乾四月之卦也故位乎巳西北隂方而坤居之坤十月之卦也故位乎亥泰正月之卦而位乎寅否七月之卦而位乎申此寅申巳亥四隅之位也各至子中一陽生而復卦直之復十一月之卦也夏至午中一隂生而姤卦直之姤五月之卦也春分卯中而大壯應二月之卦也秋分酉中而觀卦應八月之卦也此子午卯酉四正之位也辰戍丑未之月卦偏居而附於四隅臨十二月卦與泰伍故後天丑寅納艮而位乎東北夬三月卦與乾親故後天辰巳納巽而位乎東南遁六月卦與否近故後天未申納坤而位乎西南剝九月卦與坤鄰故後天戍亥納乾而位乎西北以應地之方也又若以乾上坤下觀之則八卦為經而五十六卦左右為緯傳所謂天地設位而易行乎其中者也若以否上泰下觀之則八卦成列而五十六卦上下相交傳所謂乾坤成列而易立乎其中者也周維二十八卦上應天之二十八宿自乾至大畜凡七卦上應東方蒼龍七宿角起於乾則辰當亢金龍而卯當房日兔自泰至謙凡七卦應北方玄武七宿丑當牛金牛而子當虛日鼠自坤至萃凡七卦應西方白虎七宿戍當婁金狗而酉當昻日雞自否至履凡七卦應南方朱島七宿未當鬼金羊而午當星日馬故曰在天成象在地成形而賁之彖曰觀乎天文以察時變觀乎人文以化成天下者也周易參同契曰朔且為復陽氣始通出入無疾立表微剛黃鍾建子兆乃滋彰播施柔暖藜蒸得常臨爐施條開路正光光耀浸進曰以益長丑之大吕結正低昂仰以成泰剛柔並隆隂陽交接小往大來輻湊於寅運而趍時漸歷大壯俠列卯門榆莢墮落還歸本根刑德相負晝夜始分夬隂以退陽升而前洗濯羽翮振索宿塵乾健盛明廣被四鄰陽終於已終而相干姤始紀緒履霜最先井底寒象午為蕤賔賔服於隂隂為主人遁去世位收斂其精懷德俟時棲遲昧冥否閉不通萌者不生隂伸陽詘沒陽姓名觀其耀景察仲秋情任蓄微稚老枯復榮薺麥牙藥同冒以生剝爛支體消滅其形化氣既竭亡失至神道窮則反歸乎坤元恆順地理承天布宣玄幽遠眇隔閡相連應度育種隂陽之原寥廓恍惚莫知其端先迷失軌後為主君無平不陂道之自然變易更盛消息相因終坤始復如循連環帝王承御千秋常存邵子大易吟曰天地定位否泰反類山澤通氣損咸見義雷風相薄恆益起意水火相射既濟未濟四象相交成十六事八卦相重為六十四朱子謂此釋方圖兩交股底卦東南角乾便對西北角坤舊作東南角坤便對西北角乾天地定位也西南角否對東北角泰否泰反類也不知怎生恁地巧新安程氏直方曰邵子云先天學心法也圖皆從中起萬化萬事生於心也曰皆者兼方圓圖而言也天地定位圓圖從中起也雷動風散方圖從中起也圓者動以定位為本方者靜以動散為用動而無動靜而無靜固先夭之心法與傳曰八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭馬而命之動在其中矣吉凶悔吝生乎動者也右下繫首節蓋發明先天六十四卦方圖之義八卦成列者乾兊離震巽坎艮坤成行列也此自上而數向下自左而數向右也若自中而數向外則震離兊乾巽坎艮坤亦成列也以至橫斜曲直左右前後莫不皆然而天地水火雷風山澤之象在其中矣因而重之者八卦之上各加八卦分隂分陽迭用柔剛而初二三四五上之六爻在其中矣剛柔相推者剛生於復之初九自一而二三四五以次推上而至於乾之六柔生於姤之初六自一而二三四五以次推下而至於坤之六則卦爻之變在其中矣聖人因卦爻之變繫之以吉凶悔吝之辭則舉天下之動在其中矣易象圖說內篇卷中
