  - {type: page-break, offset: 0, content: '', id: KR5a0162_SJB_003-030235c, image: sjb/03/030235c.png}
body:
  text: 清江後學張理仲純述卦畫九右六十四卦變通之圖傳曰剛柔者立本者也變通者趍時者也吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也右傳蓋發明後天六十四卦變通之義剛柔者變通之本體變通者剛柔之時用以圖推之乾剛坤柔位乎上下乃不易之定體故曰剛柔者立本者也坤初爻柔變而趍於剛爲復爲臨爲泰爲大壯爲夬進之極而爲乾自冬而夏也乾初爻剛化而趍於柔爲姤爲遯爲否爲觀爲剥退之極而爲坤自夏而冬也故曰變通者趍時者也故夫乾坤以初爻變而一隂一陽之卦各六皆自復姤而推之二爻變而二隂二陽之卦各十有五皆自臨遯而推之三爻變而三隂三陽之卦各二十皆自泰否而推之四爻變而四隂四陽之卦各十有五皆自大壯觀而推之五爻變而五隂五陽之卦各六皆自夬剥而推之縱横上下反復相推無所不可在識其通變則無所拘泥而無不通傳所謂變動不居周流六虚上下無常剛柔相易不可爲典要唯變所適然陽主進自復而左升隂主退自姤而右降泰否則隂陽中分自寅至申皆畫也而乾實冐之自酉至丑皆夜也而坤實承之故上擊言變化者進退之象剛柔者晝夜之象也或剛或柔有失有得而吉凶之理常相勝也乾上坤下定體不易天地之道貞觀者也離南坎北自麗乎書一月顯乎夜日月之道貞明者也天下之動其變無窮順理則吉逆理則凶則其所正而常者有恒以一之是亦一理而巳矣按朱子謂參同契以乾坤爲鼎器坎離爲藥物餘六十卦爲火候今以此圖推之蓋以人身形合之天地隂陽者也乾爲首而居上坤爲腹而居下離爲心坎爲腎心火也腎水也故離上而坎下陽起於復自左而升由人之督脉陽脉也起自尻循脊背而上走於首隂起於姤自右而降由人之任脉隂脉也至自咽循膺胷而下起於腹也上二十卦法天天者陽之輕清故皆四陽五陽之卦下二十卦法地地者隂之重濁故皆四隂五隂之卦中二十卦象人人者天地之德隂陽之交故皆三隂三陽之卦亦如人之經脉手足各有三隂三陽也又人上部法天中部法人下部法地亦其義也由是言之則參同之義不誣矣若夫恒卦居中則書所謂若有恒性傳所謂恒以一德孟子所謂恒心而恒之彖曰日月得天而能乆照四時變化而能乆成聖人乆於其道而天下化成觀其所恒而天地萬物之情可見矣卦畫十右六十四卦致用之圖說卦曰帝出乎震齊乎巽相見乎離致役乎坤說言乎兊戰乎乾勞乎坎成言乎艮右明後天六十四卦用圖之象其卦位所由定朱子蓋嘗致疑以爲然且當闕之不必强通而後需以卦爻交易五行次序爲說者不過因其見在之位以意附㑹臆度非有所根據也仐按河圖象數變合復推先天卦位及世俗所傳卜筮諸書更爲之圖而繹其說曰乾起於西北者天傾西北之義也原缺乾旣位西北則坤當位東南以地不滿東南故巽長女代居其位巽亦先天兊之反也是以坤退居西南三爻皆變而之乾乾三爻皆變而之坤互相反對而乾坤之位縱矣離火炎上而居南坎水潤下而居北坎三爻皆變而之離離三爻皆變而之坎亦互相反對而坎離之性縱矣艮反先天震而位乎東北巽反先天兊而位乎東南艮三爻皆變而之兊反而觀之則爲巽巽三爻皆變而之震反而觀之則爲艮亦互相反對而艮巽之位縱矣電激而雷故震居正東先天離位離火炎上故以上爻變震三爻皆變而之巽反而觀之則爲兊水瀦爲澤故兊居正西先天坎位坎水潤下故以下爻變兊三爻皆變而之艮反而觀之則爲震故震兊左右相反對而其位横矣邵子曰震兊横而六卦縱易之用也至哉言乎惟其如此故今時所傳卜筮宫卦亦乾坤相反坎離相反震兊相反艮巽相反乾宫之姤自坤而反觀之則爲夬乾之遯反坤之大壯乾之否反坤之泰乾之觀反坤之臨乾之剥反坤之復也坎宮之節自離而反觀之則爲渙坎之屯反離之䝉坎之旣濟反離之未濟坎之革反離之鼎坎之豐反離之旅也艮宫之賁自巽而反觀之則爲噬嗑艮之大畜反巽之無妄艮之損反巽之益艮之暌反巽之家人艮之履反巽之小畜也震宫之豫自兊而反觀之則爲謙震之解反兊之蹇震之恒反兊之咸震之升反兊之萃震之井反兊之困也其遊䰟歸䰟二卦謂其不在八宫正變之列以本宫第五爻變而得外體之卦内三爻皆變則爲遊䰟曰遊者自内而之外也第五爻變而内三爻不變則爲歸䰟曰歸者自外而反内也周旋左右升降上下王者之禮法盡於是矣明蓍䇿傳曰大衍之數五十其用四十有九朱子曰大衍之數蓋取河圖中宫天乂乘地十而得之以五乘十以十乘五而亦皆得五十焉至用以筮則又止用四十有九皆出於理勢之自然非人之智力所能損益也右蓍四十九䇿縚作一束法太極全體之象其數之所以然蓋緫八卦生爻之實也陽儀之畫七儀一畫象二畫卦四畫隂儀之畫七儀一畫象二畫卦四畫因而七之七七而四十有九傳曰蓍之德圎而神圓者其數竒以七圓聚而簇之則有自然之圓矣卦之德方以知万者其數偶以八方比而疊之則有自然之方矣神者妙用不測知者變通不拘蓍陽卦隂蓍動卦靜大易之體用至矣右手分一傳曰分而爲二以象兩掛一以象三兩者天地也三地者人也掛者懸置也韻㑹曰置而不用是也舊說掛於小指次指間故訓再扐而後掛不通而以爲明第二變不可不掛一字之訓左手分一矣不明而有不勝其支離矣右蓍四十有九䇿分而爲二以象兩儀而掛置一䇿於中以象人左右䇿四十有八蓋總卦爻之實也八卦經畫二十有四重之則爲四十有八又每卦各八變其爻亦四十有八也其揲法先以左手取左半之䇿握之而以右手取右半一䇿掛置于中而不復動以象人居天地之中其隂陽寒暑晝夜變化一聽于天而無與焉一雖無與而常與四十有八者並用參爲三才者也次以右手四揲左手之䇿而歸其竒或一或二或三或四於小指次指之間謂之扐象三年一閏又以右手取右半之䇿取三餘三取一餘二取六餘四取四歸於次指中指之間謂之再扐象五年再閏而後掛者謂緫所歸二竒置於掛一之所如掛一法韻㑹四合而置之是也其歸竒之數不四則八無所謂不五則九得四爲竒一箇四也得八爲偶兩箇四也於是復合過揲之䇿或四十四或四十分揲歸掛如前法爲第二變又合所餘過揲之䇿或四十或三十六或三十二分揲歸掛亦如前法爲第三變三變之後然後視其所掛之䇿得三竒爲老陽三偶爲老隂兩偶一竒以竒爲主爲少陽兩竒一偶以偶爲主爲少隂毎三變而成一爻十有八變而成一卦一卦可變而爲六十四卦而四千九十六卦在其中矣傳曰揲之以四以象四時歸竒於扐以象閏五歳再閏故再扐而後卦此圖四揲之餘左餘一則右餘三左餘三則右餘一則兩儀歸竒之陽數也左餘二則右取餘六左餘四則右亦餘四兩儀歸竒之隂數也朱子曰竒之象圓圓者徑一而圍三陽用其金老陽三竒三三爲九過揲之數亦四九三十有六偶之象方方者徑一而圍四隂用其半老隂三偶三二爲六過揲之數亦四六二十有四少陽一竒二偶一竒三二偶二積一三二二爲七過揲之數亦四七二十有八少隂一偶二竒一偶二二竒三積一二二二爲八過揲之數亦四八三十有二此蓍數卦畫自然之妙也乾其畫爲識其以陽變隂也三變皆得偶有類於坤其畫爲識其以隂變陽也三變得兩竒一偶以偶爲主即其偶之在初在二在三有類於巽離兊其畫爲而不變三變得兩偶一竒以竒爲主即其竒之在初在二在三有類於震坎艮其畫爲而不變凡有是八體亦八卦之象也爲者二十四體爲一者亦二十四體爲口者八體爲者八體共六十有四圖說如後右兩偶一竒以竒爲主爲少陽艮坎震之策凡二十有四以三變方得竒爲艮之䇿八再變得竒爲坎之䇿八初變得竒爲震之䇿八歸扐得二十䇿過揲得二十八䇿以四約之歸扐得五五个五過揲得七七个四爲陽之正而不變右兩竒一偶以偶爲主爲少隂巽離兊之荣凡二十有四以初變即得偶爲巽之荣八再變得偶爲離之荣八三變得偶爲兊之荣八歸扐得十六荣過揲得三十二荣以四約之歸扐得四四个四過揲得八八个四爲隂之正而不變右三變皆竒爲老陽乾之荣竒八歸扐得中二荣過揲得三十六荣以四約之歸扐得三三个四過揲得九九个四九者陽之極變而爲隂易以變爲占凡陽爻之變者通謂之九右三變皆偶爲老隂坤之策者八歸扐得二十四䇿過揲亦得二十四策以四約之歸扐得六六个四過揲亦得六六个四六者隂之極變而爲陽易以變爲占凡隂爻之變者通謂之六右八卦之體各八合而爲六十四卦之象焉其揲法從程子張子云再變三變不掛而得之蓋初變既掛一以象人置而不用後二變乃蒙上不復掛者爲是也揲左不揲右從唐張轅莊綽二家蓋天動地靜陽變隂合地承天而行於義爲當左餘一而有承之以三餘三而承之以一者成其爲竒之陽也左餘二而右承之以六餘四而承之以四者成其爲偶之隂也隂陽太少均齊平正右如近世三變皆掛左右並揲之法則爲老陽者十二少隂二十八少陽二十老隂四參差多寡不齊如前一變掛後二變不掛而亦左右並揲之法則爲太陽者二十七少隂二十七少陽九太隂一雖皆六十有四然太隂之體極少蓋有终歳揲著而不得遇純坤之變乾者矣明變之士幸研幾焉者變占乾之䇿二百一十有六坤之䇿百囬十有四凡三育有六十當期之日二篇之䇿萬有一千五百二十當萬物之數也是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣乾之策以老陽之數三十六乗以六爻之數則爲二百一十有六坤之策以老隂之數二十四乗以六爻之數則爲百四十有四合之凡三百有六十當期之日者周十二月爲一期以朔言之則三百五十有四日以氣言之則三百六十五日四分日之一舉氣盈朔虚之中數言之故曰三百有六十也然少陽之䇿二十有八積乾六爻之䇿則百六十有八少隂之䇿三十有二積坤六爻之策則百九十有二合之亦三百有六十而大傅不言者以易用九六而不用七八也二篇者上下經六十四卦也陽爻百九十二以老陽三十六乗之積六千九百十有二隂爻百九十二以老隂二十四乗之積四千六百有八合之則爲萬有一千五百二十當萬物之數然以少陽二十八乗陽爻百九十二積五千三百七十有六少隂三十二乘隂爻百九十二積六千一百四十有四合之亦萬有一千五百二十是知少隂少陽之數隱於老隂老陽之中七九皆爲陽而竒六八皆爲隂而偶此乾坤九六之㫖如是也乾卦用九見羣龍無首吉坤卦用六利永貞右明六十四卦九六變占之通例朱子曰凡卦六爻皆不變則占本卦彖辭而以内卦爲貞外卦爲悔按左氏傳孔成子筮立衛公子元遇屯震下坎上曰利建侯秦伯伐晉筮之遇蠱巽下艮上曰蠱之貞風也其悔山也此卦六爻不變占本卦彖辭卦象之例也一爻變則以本卦變爻辭占晉畢萬遇屯震下坎上之比坤下切坎上爻九也蔡墨遇乾乾下乾上之同人離下乾上二爻九也晋文公遇大有下上之暌兊下離上三爻九也陳敬仲遇觀坤下異上之否坤下乾上四爻六也南蒯遇坤坤上坤下之比坤下坎上五爻六也晉獻公遇歸妹兊下震上之睽兊下離上上爻六也此一爻變占本卦爻辭之例也二爻變則以本卦二變爻辭占仍以上爻爲主傳無例二爻變則占本卦及之卦彖辭而以本卦爲貞之卦爲悔公子重耳筮得國遇貞屯震下坎上悔豫坤下震上皆八蓋初五爻得九四爻得六凡三爻變二爻三爻上爻在兩卦皆八而司空季子占之曰皆利建侯此三爻變例也又變在前十卦主貞後十卦主悔見啓䝉六十田卦變圖四爻變則以之卦二不變爻占仍以下爻爲主傅無例五爻變則以之卦不變爻占穆姜往東宮遇艮之八艮下艮上史曰是謂艮之隨震下兊上蓋初四五三爻得六三上爻得九凡五爻皆變惟二爻得八不變法宜用隨卦六二係小子失丈夫爲占而史乃妄引隨之彖辭以爲對非也六爻變惟乾坤占二用餘卦占之卦彖辭蔡墨曰乾之坤曰見羣龍無首吉此其例也於是一卦可變六十四卦而四千九十六卦在其中矣引而伸之觸類而長之天下之能事畢矣易象圖說内篇卷下
